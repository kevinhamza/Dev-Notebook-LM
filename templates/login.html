<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dev Notebook LM</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: 'Inter', sans-serif;
    color: #f8f5f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
form {
    background: rgba(255, 255, 255, 0.05);
    padding: 50px 40px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(198, 167, 94, 0.2);
    width: 350px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}
h1 {
    position: absolute;
    top: 120px;
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    letter-spacing: 1px;
    border-bottom: 2px solid #c6a75e;
    padding-bottom: 10px;
}
input {
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid #334155;
    background-color: #1e293b;
    color: #f8f5f0;
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.3);
}
input::placeholder {
    color: #94a3b8;
}
input:focus {
    border: 1px solid #c6a75e;
    box-shadow: 0 0 8px rgba(198, 167, 94, 0.6);
}
button {
    padding: 12px;
    background: #c6a75e;
    color: #0f172a;
    border: none;
    border-radius: 6px;
    font-weight: 500;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}
button:hover {
    background: #e6c77b;
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(198, 167, 94, 0.3);
}
</style>
<body>
    <h1>Login to Dev Notebook LM</h1>
    <form method="POST">
        <input name="username" placeholder="Enter Username" required>
        <button type="submit">Login</button>
    </form>
</body>
</html>
