<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Dev Notebook LM</title>
    </head>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1e293b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        form {
            background-color: #2d3748;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 {
            font-family: Georgia, serif;
            font-size: 28px;
            margin-bottom: 20px;
            border-bottom: 2px solid #c6a75e;
            padding-bottom: 10px;
            position: absolute;
            top: 50px;
        }
        input {
            padding: 10px;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #1e293b;
            color: #ffffff;
            font-size: 14px;
        }
        input::placeholder {
            color: #aaa;
        }
        input:focus {
            border: 1px solid #c6a75e;
            outline: none;
        }
        button {
            padding: 10px;
            background-color: #c6a75e;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e6c77b;
        }
    </style>
    <body>
        <h1>Login to Dev Notebook LM</h1>
        <form method="POST">
            <input name="username" placeholder="Enter Username" required>
            <button type="submit">Login</button>
        </form>
    </body>
</html>
