<!DOCTYPE html>
<html>
    <head>
        <title>Dev - Study Notes</title>
    </head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: 'Inter', sans-serif;
    color: #f8f5f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}
body > * {
    width: 85%;
    max-width: 850px;
}
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    margin-top: 60px;
    margin-bottom: 40px;
    letter-spacing: 1px;
    border-bottom: 2px solid #c6a75e;
    padding-bottom: 12px;
}
#cardBox {
    background: rgba(255, 255, 255, 0.05);
    padding: 50px 40px;
    border-radius: 14px;
    backdrop-filter: blur(10px);
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(198, 167, 94, 0.2);
    text-align: center;
    animation: fadeIn 0.5s ease-in-out;
}
#question {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: #c6a75e;
    margin-bottom: 30px;
}
#answer {
    background: rgba(255, 255, 255, 0.07);
    padding: 18px 22px;
    border-radius: 10px;
    line-height: 1.6;
    border-left: 3px solid #c6a75e;
    margin-top: 20px;
    animation: fadeIn 0.4s ease-in-out;
}
button {
    margin-top: 15px;
    padding: 12px 28px;
    background: #c6a75e;
    color: #0f172a;
    border: none;
    border-radius: 6px;
    font-weight: 500;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

button:hover {
    background: #e6c77b;
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(198, 167, 94, 0.3);
}
p {
    background: rgba(255, 255, 255, 0.05);
    padding: 18px 22px;
    border-radius: 10px;
    border-left: 3px solid #c6a75e;
    margin-top: 20px;
}
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
    <body>
        <h1>Flashcards Study Mode</h1>
        {% if cards %}
            <div id = "cardBox">
                <h2 id = "question"></h2>
                    <button onclick = "showAnswer()">Show Answer</button>
                    <p id = "answer" style = "display : none ;"></p>
                    <br>
                    <button onclick = "nextCard()">Next Card</button>
            </div>
        {% else %}
            <p>No flashcards available. Please create some flashcards first.</p>
        {% endif %}
{% if cards %}
<script>
    const cards = {{ cards | tojson }};
    let index = 0;

    function loadCard() {
        document.getElementById("question").innerText = cards[index][0];
        document.getElementById("answer").innerText = cards[index][1];
        document.getElementById("answer").style.display = "none";
    }
    function showAnswer() {
        document.getElementById("answer").style.display = "block";
    }
    function nextCard() {
        index = (index + 1) % cards.length;
        loadCard();
    }

    loadCard();
</script>
{% endif %}
    </body>
</html>
