<html>
    <head>
        <title>Dev Notebook LM - History</title>
    </head>
    <style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #1e293b;
    color: #ffffff;
    text-align: center;
}
body > * {
    width: 80%;
    margin: auto;
}
h1 {
    font-family: Georgia, serif;
    font-size: 32px;
    margin-top: 40px;
    margin-bottom: 20px;
    border-bottom: 2px solid #c6a75e;
}
h3 {
    font-size: 18px;
    color: #c6a75e;
    margin-top: 20px;
}
hr {
    margin: 30px 0;
    border: 1px solid #c6a75e;
}
p, pre {
    background-color: #2d3748;
    padding: 15px;
    margin-bottom: 15px;
    border-left: 4px solid #c6a75e;
    text-align: left;
}
pre {
    font-family: monospace;
    font-size: 14px;

    overflow-x: auto;
}
</style>
    <body>
        <h1>History of Notes</h1>
        {% for item in data%}
        <hr>
        <h3>notes:</h3>
        <p>{{ item[0] }}</p>
        <h3>Summary:</h3>
        <p>{{ item[1] }}</p>
        <h3>Flashcards:</h3>
        <pre>{{ item[2] }}</pre>
        {% endfor %}
    </body>
</html>
