<!DOCTYPE html>
<html>
    <head>
        <title>Dev - Study Notes</title>
    </head>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1e293b;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        body > * {
            width: 85%;
            max-width: 850px;
        }
        h1 {
            font-family: Georgia, serif;
            font-size: 32px;
            margin-top: 40px;
            margin-bottom: 30px;
            border-bottom: 2px solid #c6a75e;
            padding-bottom: 10px;
        }
        #cardBox {
            background-color: #2d3748;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        #question {
            font-family: Georgia, serif;
            font-size: 22px;
            color: #c6a75e;
            margin-bottom: 20px;
        }
        #answer {
            background-color: #1e293b;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #c6a75e;
            border-radius: 5px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #c6a75e;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e6c77b;
        }
        p {
            background-color: #2d3748;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #c6a75e;
        }
    </style>
    <body>
        <h1>Flashcards Study Mode</h1>
        {% if cards %}
            <div id = "cardBox">
                <h2 id = "question"></h2>
                    <button onclick = "showAnswer()">Show Answer</button>
                    <p id = "answer" style = "display : none ;"></p>
                    <br>
                    <button onclick = "nextCard()">Next Card</button>
            </div>
        {% else %}
            <p>No flashcards available. Please create some flashcards first.</p>
        {% endif %}
{% if cards %}
<script>
    const cards = {{ cards | tojson }};
    let index = 0;

    function loadCard() {
        document.getElementById("question").innerText = cards[index][0];
        document.getElementById("answer").innerText = cards[index][1];
        document.getElementById("answer").style.display = "none";
    }
    function showAnswer() {
        document.getElementById("answer").style.display = "block";
    }
    function nextCard() {
        index = (index + 1) % cards.length;
        loadCard();
    }

    loadCard();
</script>
{% endif %}
    </body>
</html>
