<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Dev Notebook LM</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1e293b;
            color: #ffffff;
            text-align: center;
        }
        body > * {
            width: 80%;
            max-width: 900px;
            margin: auto;
        }
        h1 {
            font-family: Georgia, serif;
            font-size: 32px;
            margin-top: 40px;
            margin-bottom: 10px;
            border-bottom: 2px solid #c6a75e;
        }
        h2 {
            font-family: Georgia, serif;
            font-size: 22px;
            margin-top: 30px;
            color: #c6a75e;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #2d3748;
            color: #ffffff;
            font-size: 14px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #c6a75e;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e6c77b;
        }
        p {
            background-color: #2d3748;
            padding: 10px;
            margin-top: 10px;
            border-left: 4px solid #c6a75e;
            text-align: left;
        }
        a {
            display: inline-block;
            margin-top: 15px;
            color: #c6a75e;
            text-decoration: none;
        }
        a:hover {
            color: #ffffff;
        }
        p:last-of-type {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
            background: none;
            border: none;
        }
    </style>
    <body>
        <h1>Dev Notebook LM : </h1>
        <br>
        <form method="POST">
            <textarea id="notes" name="notes" rows="10" cols="60"></textarea>
            <button type="submit">Submit</button>
        </form>
            <h2>Summary:</h2>
            <p>{{ result }}</p>
            <h2>Flashcards:</h2>
            <p>{{ flashcard }}</p>
            <br>
            <a href="/history">View History Notes</a>
            <br>
            <a href="/study">Study Flashcards</a>
            <br>
            <a href="/logout">Logout</a>
            <br>
            <p>Login as: {{ session["user"] }}</p>
    </body>
</html>
